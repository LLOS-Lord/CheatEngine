name: CheatEngine
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: 14.0
  xcodeVersion: 16.0

settings:
  base:
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_BITCODE: "NO"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"

targets:
  CheatEngine:
    type: application
    platform: iOS
    sources:
      - path: CheatEngine
        excludes:
          - "Info.plist"  # We specify it separately
    settings:
      base:
        INFOPLIST_FILE: CheatEngine/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.CheatEngine
        SWIFT_OBJC_BRIDGING_HEADER: CheatEngine/Bridging-Header.h
        CODE_SIGN_ENTITLEMENTS: CheatEngine/cheatengine.entitlements
    info:
      path: CheatEngine/Info.plist
