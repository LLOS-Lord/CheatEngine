name: Build CheatEngine IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project CheatEngine.xcodeproj \
            -scheme CheatEngine \
            -archivePath ./build/CheatEngine.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir Payload
          cp -r ./build/CheatEngine.xcarchive/Products/Applications/CheatEngine.app Payload/
          zip -r CheatEngine.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: CheatEngine.ipa
          path: CheatEngine.ipa
