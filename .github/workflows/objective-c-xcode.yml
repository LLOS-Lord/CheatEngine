name: Build CheatEngine IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Clean previous Xcode project (if exists)
        run: rm -rf CheatEngine.xcodeproj

      - name: Generate Xcode project
        run: xcodegen generate --no-cache

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project CheatEngine.xcodeproj \
            -scheme CheatEngine \
            -archivePath ./build/CheatEngine.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir Payload
          cp -r ./build/CheatEngine.xcarchive/Products/Applications/CheatEngine.app Payload/
          zip -r CheatEngine.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CheatEngine.ipa
          path: CheatEngine.ipa
